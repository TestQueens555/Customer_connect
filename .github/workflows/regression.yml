# ══════════════════════════════════════════════════════════════════════════════
# regression.yml  —  Nightly & On-Demand Regression Suite
# ══════════════════════════════════════════════════════════════════════════════

name: Regression — Nightly & On-Demand

on:
  schedule:
    - cron: '0 18 * * *'   # 12:00 AM IST daily (6:00 PM UTC)
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature to regress (leave as "all" for full suite)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - Login
          - Dashboard
          - CreateTicket
          - ActionQueue

concurrency:
  group: regression-${{ github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:

  pre-checks:
    name: Pre-Regression CI Checks
    uses: ./.github/workflows/ci.yml

  regression:
    name: Full Regression Run
    runs-on: ubuntu-latest
    needs: pre-checks
    timeout-minutes: 60
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create output directories
        run: |
          mkdir -p reports/monocart reports/html-report reports/screenshots
          mkdir -p "Test Execution Report_Git/Feature Reports"
          mkdir -p "Test Execution Report_Git/Daily Reports"

      - name: Run regression tests
        run: |
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          if   [ "$FEATURE" = "all" ];          then npx playwright test --config playwright.config.js
          elif [ "$FEATURE" = "Login" ];        then npx playwright test tests/login.spec.js --config playwright.config.js
          elif [ "$FEATURE" = "Dashboard" ];    then npx playwright test tests/dashboard.spec.js --config playwright.config.js
          elif [ "$FEATURE" = "CreateTicket" ]; then npx playwright test tests/createTicket.spec.js --config playwright.config.js
          elif [ "$FEATURE" = "ActionQueue" ];  then npx playwright test tests/actionQueue.spec.js --config playwright.config.js
          else npx playwright test --config playwright.config.js
          fi
        continue-on-error: true

      - name: Generate regression Excel reports
        if: always()
        env:
          REPORT_DIR: "Test Execution Report_Git"
        run: |
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          declare -A FEATURE_MAP
          FEATURE_MAP["login"]="Login"
          FEATURE_MAP["dashboard"]="Dashboard"
          FEATURE_MAP["createTicket"]="CreateTicket"
          FEATURE_MAP["actionQueue"]="ActionQueue"

          if [ "$FEATURE" = "all" ]; then
            for spec in tests/*.spec.js; do
              fname=$(basename "$spec" .spec.js)
              FEAT="${FEATURE_MAP[$fname]:-}"
              if [ -z "$FEAT" ]; then
                FEAT="$(echo "${fname:0:1}" | tr '[:lower:]' '[:upper:]')${fname:1}"
              fi
              echo "→ Regression report: $FEAT"
              REPORT_DIR="Test Execution Report_Git" node utils/generate-report.js --feature="$FEAT" --regression || true
            done
          else
            REPORT_DIR="Test Execution Report_Git" node utils/generate-report.js --feature="$FEATURE" --regression || true
          fi

      - name: Generate daily bug report
        if: always()
        run: node utils/generate-daily-bug-report.js || true

      - name: Save reference document
        if: always()
        run: node utils/save-reference.js || true

      - name: Commit regression reports
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Test Execution Report_Git/" || true
          if git diff --cached --quiet; then
            echo "No report changes — skipping commit"
            exit 0
          fi
          DATE=$(date +'%Y-%m-%d %H:%M')
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          RUN_TYPE="${{ github.event_name == 'schedule' && 'Nightly' || 'Manual' }}"
          git commit -m "Regression [$RUN_TYPE $DATE]: $FEATURE — reports updated"
          PUSHED=false
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin main
            if git push origin main; then PUSHED=true; break; fi
            sleep 10
          done
          [ "$PUSHED" = "true" ] && echo "✅ Reports pushed" || { echo "❌ Push failed"; exit 1; }

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-html-${{ github.run_id }}
          path: reports/html-report/
          retention-days: 60
          if-no-files-found: warn

      - name: Upload Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-excel-${{ github.run_id }}
          path: "Test Execution Report_Git/"
          retention-days: 60
          if-no-files-found: warn

      - name: Write regression summary
        if: always()
        run: |
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          RUN_TYPE="${{ github.event_name == 'schedule' && 'Nightly Scheduled' || 'Manual' }}"
          {
            echo "### 🔄 Regression Run — $RUN_TYPE"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Feature** | $FEATURE |"
            echo "| **Run type** | $RUN_TYPE |"
            echo "| **Triggered by** | @${{ github.actor }} |"
          } >> $GITHUB_STEP_SUMMARY
