# ══════════════════════════════════════════════════════════════════════════════
# regression.yml  —  Nightly & On-Demand Regression Suite
#
# Schedule : 12:00 AM UTC daily  (5:30 AM IST)
# Manual   : workflow_dispatch with feature selector
#
# Pipeline :
#   pre-checks  → ci.yml (lint + smoke gate)
#   regression  → full test run → feature reports → daily bug report → commit
# ══════════════════════════════════════════════════════════════════════════════

name: Regression — Nightly & On-Demand

on:
  schedule:
    - cron: '0 0 * * *'    # 12:00 AM UTC = 5:30 AM IST

  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature to regress (leave as "all" for full suite)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - Login
          - Dashboard
          - CreateTicket

# No cancel-in-progress — regression must always complete fully
concurrency:
  group: regression-${{ github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:

  # ── Gate: lint + smoke ────────────────────────────────────────────────────
  pre-checks:
    name: Pre-Regression CI Checks
    uses: ./.github/workflows/ci.yml

  # ── Full regression run ───────────────────────────────────────────────────
  regression:
    name: Full Regression Run
    runs-on: ubuntu-latest
    needs: pre-checks
    timeout-minutes: 60
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create output directories
        run: |
          mkdir -p reports/monocart reports/html-report reports/screenshots
          mkdir -p "Test Execution Report/Feature Reports"
          mkdir -p "Test Execution Report/Daily Reports"

      # ── Run tests ───────────────────────────────────────────────────────────
      - name: Run regression tests
        run: |
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          if [ "$FEATURE" = "all" ]; then
            npx playwright test
          elif [ "$FEATURE" = "Login" ]; then
            npx playwright test tests/login.spec.js
          elif [ "$FEATURE" = "Dashboard" ]; then
            npx playwright test tests/dashboard.spec.js
          elif [ "$FEATURE" = "CreateTicket" ]; then
            npx playwright test tests/createTicket.spec.js
          else
            npx playwright test
          fi
        continue-on-error: true

      # ── Generate feature reports with --regression flag ─────────────────────
      # The --regression flag preserves existing history and marks fixed bugs
      - name: Generate regression Excel reports
        if: always()
        run: |
          FEATURE="${{ github.event.inputs.feature || 'all' }}"

          # Map of spec filename → feature name (handles camelCase correctly)
          declare -A FEATURE_MAP
          FEATURE_MAP["login"]="Login"
          FEATURE_MAP["dashboard"]="Dashboard"
          FEATURE_MAP["createTicket"]="CreateTicket"

          if [ "$FEATURE" = "all" ]; then
            for spec in tests/*.spec.js; do
              fname=$(basename "$spec" .spec.js)
              FEAT="${FEATURE_MAP[$fname]:-}"
              if [ -z "$FEAT" ]; then
                # Fallback: capitalise first letter only
                FEAT="$(echo "${fname:0:1}" | tr '[:lower:]' '[:upper:]')${fname:1}"
              fi
              echo "→ Regression report: $FEAT"
              node utils/generate-report.js --feature="$FEAT" --regression || true
            done
          else
            node utils/generate-report.js --feature="$FEATURE" --regression || true
          fi

      # ── Daily bug report ────────────────────────────────────────────────────
      - name: Generate daily bug report
        if: always()
        run: node utils/generate-daily-bug-report.js || true

      # ── Save reference ──────────────────────────────────────────────────────
      - name: Save reference document
        if: always()
        run: node utils/save-reference.js || true

      # ── Commit reports back to main ─────────────────────────────────────────
      - name: Commit regression reports
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "Test Execution Report/" || true

          if git diff --cached --quiet; then
            echo "No report changes — skipping commit"
            exit 0
          fi

          DATE=$(date +'%Y-%m-%d %H:%M')
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          RUN_TYPE="${{ github.event_name == 'schedule' && 'Nightly' || 'Manual' }}"
          git commit -m "Regression [$RUN_TYPE $DATE]: $FEATURE — reports updated"

          PUSHED=false
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin main
            if git push origin main; then
              PUSHED=true
              break
            fi
            sleep 10
          done

          [ "$PUSHED" = "true" ] && echo "✅ Reports pushed" || { echo "❌ Push failed"; exit 1; }

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-html-${{ github.run_id }}
          path: reports/html-report/
          retention-days: 60
          if-no-files-found: warn

      - name: Upload Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-excel-${{ github.run_id }}
          path: Test Execution Report/
          retention-days: 60
          if-no-files-found: warn

      - name: Upload Daily Bug report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-bug-report-${{ github.run_id }}
          path: Test Execution Report/Daily Reports/
          retention-days: 60
          if-no-files-found: warn

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Write regression summary
        if: always()
        run: |
          FEATURE="${{ github.event.inputs.feature || 'all' }}"
          RUN_TYPE="${{ github.event_name == 'schedule' && 'Nightly Scheduled' || 'Manual' }}"
          {
            echo "### 🔄 Regression Run — $RUN_TYPE"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Feature** | $FEATURE |"
            echo "| **Run type** | $RUN_TYPE |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **App URL** | http://customerportal.dev-ts.online |"
            echo ""
            echo "### 📥 Artifacts"
            echo "- \`regression-html-${{ github.run_id }}\`"
            echo "- \`regression-excel-${{ github.run_id }}\`"
            echo "- \`daily-bug-report-${{ github.run_id }}\`"
          } >> $GITHUB_STEP_SUMMARY
