# ══════════════════════════════════════════════════════════════════════════════
# playwright.yml  —  DISABLED
#
# This workflow is superseded by playwright-tests.yml which handles all
# push/PR triggers, feature detection, report generation and commit-back.
#
# Kept here for reference only. Only runs on manual workflow_dispatch.
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E Tests (legacy — disabled)

on:
  workflow_dispatch:   # manual only — no longer auto-triggers on push/PR

env:
  NODE_VERSION: '22'

jobs:
  playwright:
    name: Run All Tests (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run all tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate all reports
        if: always()
        run: |
          for spec in tests/*.spec.js; do
            fname=$(basename "$spec" .spec.js)
            FEAT="$(echo "${fname:0:1}" | tr '[:lower:]' '[:upper:]')${fname:1}"
            node utils/generate-report.js --feature="$FEAT" || true
          done
          node utils/generate-daily-bug-report.js || true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-legacy-report-${{ github.run_id }}
          path: reports/html-report/
          retention-days: 14
          if-no-files-found: warn
