name: Playwright E2E Tests + Monocart Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js ────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Playwright browser ─────────────────────────────────────
      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      # ── 5. Detect which tests to run ──────────────────────────────
      - name: Detect changed files and set test scope
        id: scope
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -q "tests/login\|pages/LoginPage\|test-data/loginData"; then
            echo "test_path=tests/login.spec.js" >> $GITHUB_OUTPUT
            echo "label=Login Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/dashboard\|pages/DashboardPage"; then
            echo "test_path=tests/dashboard.spec.js" >> $GITHUB_OUTPUT
            echo "label=Dashboard Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/register\|pages/RegisterPage\|test-data/registerData"; then
            echo "test_path=tests/register.spec.js" >> $GITHUB_OUTPUT
            echo "label=Register Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/profile\|pages/ProfilePage\|test-data/profileData"; then
            echo "test_path=tests/profile.spec.js" >> $GITHUB_OUTPUT
            echo "label=Profile Module" >> $GITHUB_OUTPUT
          else
            echo "test_path=all" >> $GITHUB_OUTPUT
            echo "label=Full Suite" >> $GITHUB_OUTPUT
          fi

      # ── 6. Create output folders ──────────────────────────────────
      - name: Create output directories
        run: mkdir -p reports/monocart reports/html-report reports/screenshots

      # ── 7. Run Playwright tests ───────────────────────────────────
      - name: "Run tests — ${{ steps.scope.outputs.label }}"
        id: playwright
        run: |
          if [ "${{ steps.scope.outputs.test_path }}" = "all" ]; then
            npx playwright test
          else
            npx playwright test ${{ steps.scope.outputs.test_path }}
          fi
        continue-on-error: true

      # ── 8. Verify report generated ────────────────────────────────
      - name: Verify Monocart report
        if: always()
        run: |
          echo "── Monocart report ──"
          ls -lh reports/monocart/ 2>/dev/null || echo "monocart folder missing"
          echo "── Playwright HTML ──"
          ls -lh reports/html-report/ 2>/dev/null || echo "html-report folder missing"

      # ── 9. Upload Monocart HTML report ────────────────────────────
      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-run-${{ github.run_number }}
          path: reports/monocart/
          retention-days: 30
          if-no-files-found: warn

      # ── 10. Upload Playwright HTML report ─────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-run-${{ github.run_number }}
          path: reports/html-report/
          retention-days: 30
          if-no-files-found: warn

      # ── 11. Upload test results JSON ──────────────────────────────
      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json-run-${{ github.run_number }}
          path: reports/test-results.json
          retention-days: 30
          if-no-files-found: warn

      # ── 12. Job summary ───────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          # Parse results from JSON
          if [ -f reports/test-results.json ]; then
            TOTAL=$(node -e "const r=require('./reports/test-results.json'); const t=r.suites?.flatMap?.(s=>s.specs?.flatMap?.(sp=>sp.tests)||[])||[]; console.log(t.length)" 2>/dev/null || echo "?")
            PASSED=$(node -e "const r=require('./reports/test-results.json'); const t=r.suites?.flatMap?.(s=>s.specs?.flatMap?.(sp=>sp.tests)||[])||[]; console.log(t.filter(x=>x.results?.[0]?.status==='passed').length)" 2>/dev/null || echo "?")
            FAILED=$(node -e "const r=require('./reports/test-results.json'); const t=r.suites?.flatMap?.(s=>s.specs?.flatMap?.(sp=>sp.tests)||[])||[]; console.log(t.filter(x=>x.results?.[0]?.status==='failed').length)" 2>/dev/null || echo "?")
          else
            TOTAL="?"; PASSED="?"; FAILED="?"
          fi

          echo "## 🧪 QA — ${{ steps.scope.outputs.label }} | Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tests scope** | ${{ steps.scope.outputs.label }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **✅ Passed** | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| **❌ Failed** | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Reports (download from Artifacts ↑)" >> $GITHUB_STEP_SUMMARY
          echo "| Report | How to open |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`monocart-report-run-${{ github.run_number }}\` | ✅ Download zip → extract → **double-click index.html** |" >> $GITHUB_STEP_SUMMARY
          echo "| \`playwright-report-run-${{ github.run_number }}\` | Download zip → extract → double-click index.html |" >> $GITHUB_STEP_SUMMARY
          echo "| \`test-results-json-run-${{ github.run_number }}\` | Raw JSON for scripting |" >> $GITHUB_STEP_SUMMARY
