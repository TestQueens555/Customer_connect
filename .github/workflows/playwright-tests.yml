name: Playwright E2E Tests + Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js ────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Playwright browser ─────────────────────────────────────
      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      # ── 5. Allure CLI ─────────────────────────────────────────────
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ── 6. Detect which tests to run ──────────────────────────────
      - name: Detect changed files and set test scope
        id: scope
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -q "tests/login\|pages/LoginPage\|test-data/loginData"; then
            echo "test_path=tests/login.spec.js" >> $GITHUB_OUTPUT
            echo "label=Login Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/dashboard\|pages/DashboardPage"; then
            echo "test_path=tests/dashboard.spec.js" >> $GITHUB_OUTPUT
            echo "label=Dashboard Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/register\|pages/RegisterPage\|test-data/registerData"; then
            echo "test_path=tests/register.spec.js" >> $GITHUB_OUTPUT
            echo "label=Register Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/profile\|pages/ProfilePage\|test-data/profileData"; then
            echo "test_path=tests/profile.spec.js" >> $GITHUB_OUTPUT
            echo "label=Profile Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/checkout\|pages/CheckoutPage\|test-data/checkoutData"; then
            echo "test_path=tests/checkout.spec.js" >> $GITHUB_OUTPUT
            echo "label=Checkout Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/orders\|pages/OrdersPage\|test-data/ordersData"; then
            echo "test_path=tests/orders.spec.js" >> $GITHUB_OUTPUT
            echo "label=Orders Module" >> $GITHUB_OUTPUT
          else
            echo "test_path=all" >> $GITHUB_OUTPUT
            echo "label=Full Suite" >> $GITHUB_OUTPUT
          fi

      # ── 7. Create output folders ──────────────────────────────────
      - name: Create output directories
        run: mkdir -p allure-results reports/screenshots reports/html-report

      # ── 8. Run Playwright tests ───────────────────────────────────
      - name: "Run tests — ${{ steps.scope.outputs.label }}"
        id: playwright
        run: |
          if [ "${{ steps.scope.outputs.test_path }}" = "all" ]; then
            echo "▶ Running full test suite"
            npx playwright test
          else
            echo "▶ Running: ${{ steps.scope.outputs.test_path }}"
            npx playwright test ${{ steps.scope.outputs.test_path }}
          fi
        continue-on-error: true

      # ── 9. Generate Allure report ─────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # ── 10. Verify Allure report structure ────────────────────────
      - name: Verify Allure report contents
        if: always()
        run: |
          echo "── Allure report structure ──"
          ls -la allure-report/
          echo "── data folder ──"
          ls -la allure-report/data/ 2>/dev/null || echo "data/ folder missing!"
          echo "── test cases ──"
          ls allure-report/data/test-cases/ 2>/dev/null | wc -l || echo "no test cases"
          echo "── allure-results raw ──"
          ls allure-results/ | wc -l

      # ── 11. Upload Allure report (full folder) ────────────────────
      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-run-${{ github.run_number }}
          path: allure-report/
          retention-days: 30
          if-no-files-found: warn

      # ── 12. Upload Playwright HTML report ─────────────────────────
      - name: Upload Playwright HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-run-${{ github.run_number }}
          path: reports/html-report/
          retention-days: 30
          if-no-files-found: warn

      # ── 13. Upload raw allure-results ─────────────────────────────
      - name: Upload raw allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-run-${{ github.run_number }}
          path: allure-results/
          retention-days: 30
          if-no-files-found: warn

      # ── 14. Job summary ───────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          TOTAL=$(ls allure-results/*.json 2>/dev/null | wc -l || echo "0")
          PASSED=$(grep -l '"status":"passed"' allure-results/*.json 2>/dev/null | wc -l || echo "0")
          FAILED=$(grep -l '"status":"failed"' allure-results/*.json 2>/dev/null | wc -l || echo "0")

          echo "## 🧪 QA Test Run — #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tests run** | ${{ steps.scope.outputs.label }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total results** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | ✅ $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | ❌ $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| **Allure report** | Download \`allure-report-run-${{ github.run_number }}\` from Artifacts ↑ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 How to open Allure report" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`allure-report-run-${{ github.run_number }}\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract the zip" >> $GITHUB_STEP_SUMMARY
          echo "3. Open a terminal in the extracted folder" >> $GITHUB_STEP_SUMMARY
          echo "4. Run: \`npx allure open .\` OR serve with any HTTP server" >> $GITHUB_STEP_SUMMARY
          echo "5. ⚠️ Do NOT open index.html directly — Allure needs an HTTP server" >> $GITHUB_STEP_SUMMARY
