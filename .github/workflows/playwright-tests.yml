name: Playwright E2E Tests + Reports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Allow CI to push Excel reports back to main
    permissions:
      contents: write

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js ────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Playwright browser ─────────────────────────────────────
      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      # ── 5. Detect which tests to run ──────────────────────────────
      - name: Detect changed files and set test scope
        id: scope
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed: $CHANGED"

          if echo "$CHANGED" | grep -q "tests/login\|pages/LoginPage\|test-data/loginData"; then
            echo "test_path=tests/login.spec.js" >> $GITHUB_OUTPUT
            echo "feature=Login"                 >> $GITHUB_OUTPUT
            echo "label=Login Module"            >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/dashboard\|pages/DashboardPage"; then
            echo "test_path=tests/dashboard.spec.js" >> $GITHUB_OUTPUT
            echo "feature=Dashboard"                 >> $GITHUB_OUTPUT
            echo "label=Dashboard Module"            >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/register\|pages/RegisterPage"; then
            echo "test_path=tests/register.spec.js" >> $GITHUB_OUTPUT
            echo "feature=Register"                 >> $GITHUB_OUTPUT
            echo "label=Register Module"            >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/profile\|pages/ProfilePage"; then
            echo "test_path=tests/profile.spec.js" >> $GITHUB_OUTPUT
            echo "feature=Profile"                 >> $GITHUB_OUTPUT
            echo "label=Profile Module"            >> $GITHUB_OUTPUT
          else
            echo "test_path=all"     >> $GITHUB_OUTPUT
            echo "feature=All"       >> $GITHUB_OUTPUT
            echo "label=Full Suite"  >> $GITHUB_OUTPUT
          fi

      # ── 6. Create output folders ──────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p reports/monocart reports/html-report reports/screenshots
          mkdir -p "Test Execution Report/Feature Reports"
          mkdir -p "Test Execution Report/Daily Reports"

      # ── 7. Run Playwright tests ───────────────────────────────────
      - name: "Run tests — ${{ steps.scope.outputs.label }}"
        id: playwright
        run: |
          if [ "${{ steps.scope.outputs.test_path }}" = "all" ]; then
            npx playwright test
          else
            npx playwright test ${{ steps.scope.outputs.test_path }}
          fi
        continue-on-error: true

      # ── 8. Generate Feature Excel report ─────────────────────────
      - name: Generate Feature Excel report
        if: always()
        run: |
          FEATURE="${{ steps.scope.outputs.feature }}"
          if [ "$FEATURE" = "All" ]; then
            # Generate report for each spec that exists
            for spec in tests/*.spec.js; do
              fname=$(basename "$spec" .spec.js)
              FEAT="${fname^}"
              echo "Generating report for $FEAT..."
              node utils/generate-report.js --feature=$FEAT || true
            done
          else
            node utils/generate-report.js --feature=$FEATURE
          fi

      # ── 9. Generate Daily Bug report ─────────────────────────────
      - name: Generate Daily Bug report
        if: always()
        run: |
          FEATURE="${{ steps.scope.outputs.feature }}"
          node utils/generate-daily-report.js --feature=$FEATURE

      # ── 10. Commit and push Excel reports back to repo ────────────
      - name: Commit Excel reports to repository
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "Test Execution Report/" || true

          if git diff --cached --quiet; then
            echo "No report changes to commit — skipping push"
            exit 0
          fi

          DATE=$(date +'%Y-%m-%d %H:%M')
          FEATURE="${{ steps.scope.outputs.feature }}"
          git commit -m "CI Reports [$DATE]: $FEATURE — Excel reports updated"

          # Push with up to 3 retries — each attempt pulls rebase first
          # so concurrent local pushes or other CI commits never block us
          PUSHED=false
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin main
            if git push origin main; then
              PUSHED=true
              break
            fi
            echo "Attempt $i failed — waiting 10s before retry..."
            sleep 10
          done

          if [ "$PUSHED" = "true" ]; then
            echo "✅ Excel reports pushed to repo"
          else
            echo "❌ All 3 push attempts failed"
            exit 1
          fi

      # ── 11. Upload Monocart report artifact ───────────────────────
      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-run-${{ github.run_number }}
          path: reports/monocart/
          retention-days: 30
          if-no-files-found: warn

      # ── 12. Upload Playwright HTML report ─────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-run-${{ github.run_number }}
          path: reports/html-report/
          retention-days: 30
          if-no-files-found: warn

      # ── 13. Job summary ───────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          if [ -f reports/test-results.json ]; then
            TOTAL=$(node -e "try{const r=require('./reports/test-results.json');const t=r.suites?.flatMap(s=>s.specs?.flatMap(sp=>sp.tests)||[])||[];console.log(t.length)}catch{console.log('?')}" 2>/dev/null)
            PASSED=$(node -e "try{const r=require('./reports/test-results.json');const t=r.suites?.flatMap(s=>s.specs?.flatMap(sp=>sp.tests)||[])||[];console.log(t.filter(x=>x.results?.[0]?.status==='passed').length)}catch{console.log('?')}" 2>/dev/null)
            FAILED=$(node -e "try{const r=require('./reports/test-results.json');const t=r.suites?.flatMap(s=>s.specs?.flatMap(sp=>sp.tests)||[])||[];console.log(t.filter(x=>x.results?.[0]?.status==='failed').length)}catch{console.log('?')}" 2>/dev/null)
          else
            TOTAL="?"; PASSED="?"; FAILED="?"
          fi

          echo "## 🧪 ${{ steps.scope.outputs.label }} | Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Scope** | ${{ steps.scope.outputs.label }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **✅ Passed** | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| **❌ Failed** | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Reports saved to repository" >> $GITHUB_STEP_SUMMARY
          echo "| Folder | Contents |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`Test Execution Report/Feature Reports/\` | ${{ steps.scope.outputs.feature }}.xlsx |" >> $GITHUB_STEP_SUMMARY
          echo "| \`Test Execution Report/Daily Reports/\` | DailyBugReport_$(date +%Y-%m-%d).xlsx |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Artifacts (download and double-click index.html)" >> $GITHUB_STEP_SUMMARY
          echo "- \`monocart-report-run-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`playwright-report-run-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
