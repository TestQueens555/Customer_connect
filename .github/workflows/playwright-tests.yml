name: Playwright E2E Tests + Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history needed for diff detection

      # ── 2. Node.js ────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Playwright browser ─────────────────────────────────────
      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      # ── 5. Allure CLI ─────────────────────────────────────────────
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ── 6. Smart test detection ───────────────────────────────────
      - name: Detect which tests to run
        id: scope
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "tests/login\|pages/LoginPage"; then
            echo "test_path=tests/login.spec.js" >> $GITHUB_OUTPUT
            echo "label=Login Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/dashboard\|pages/DashboardPage"; then
            echo "test_path=tests/dashboard.spec.js" >> $GITHUB_OUTPUT
            echo "label=Dashboard Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/register"; then
            echo "test_path=tests/register.spec.js" >> $GITHUB_OUTPUT
            echo "label=Register Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/profile"; then
            echo "test_path=tests/profile.spec.js" >> $GITHUB_OUTPUT
            echo "label=Profile Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/checkout"; then
            echo "test_path=tests/checkout.spec.js" >> $GITHUB_OUTPUT
            echo "label=Checkout Module" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "tests/orders"; then
            echo "test_path=tests/orders.spec.js" >> $GITHUB_OUTPUT
            echo "label=Orders Module" >> $GITHUB_OUTPUT
          else
            echo "test_path=all" >> $GITHUB_OUTPUT
            echo "label=Full Suite" >> $GITHUB_OUTPUT
          fi


      # ── 7. Run Playwright tests ───────────────────────────────────
      - name: "Run: ${{ steps.scope.outputs.label }}"
        id: playwright
        run: |
          if [ "${{ steps.scope.outputs.test_path }}" = "all" ]; then
            npx playwright test
          else
            npx playwright test ${{ steps.scope.outputs.test_path }}
          fi
        continue-on-error: true

      # ── 8. Generate Allure report ─────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # ── 9. Upload Allure report artifact ──────────────────────────
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-run-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      # ── 10. Upload Playwright HTML report artifact ────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-run-${{ github.run_number }}
          path: reports/html-report/
          retention-days: 30

      # ── 11. Publish to gh-pages (main branch only) ────────────────
      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: allure-report
          keep_files: true

      # ── 12. Job summary ───────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🧪 QA Test Run — Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tests run** | ${{ steps.scope.outputs.label }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run number** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Allure report** | See Artifacts tab ↑ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Live report** | https://testqueens555.github.io/Customer_connect/allure-report |" >> $GITHUB_STEP_SUMMARY
